name: Tool argument validation
description: The mutually-exclusive target rules are enforced for tool arguments.
steps:
  - call: run_windbg_cmd      # neither dump_path nor connection_string
    arguments:
      command: "k"
    expect:
      isError: true

  - call: run_windbg_cmd      # both targets at once
    arguments:
      command: "k"
      dump_path: "C:/nope.dmp"
      connection_string: "tcp:Port=5005,Server=127.0.0.1"
    expect:
      isError: true

  - call: send_ctrl_break     # neither target
    arguments: {}
    expect:
      isError: true

  - call: send_ctrl_break     # both targets at once
    arguments:
      dump_path: "C:/nope.dmp"
      connection_string: "tcp:Port=5005,Server=127.0.0.1"
    expect:
      isError: true

  - call: open_windbg_kernel  # empty kernel connection string is rejected before any cdb launch
    arguments:
      connection_string: ""
    expect:
      isError: true

  - call: close_windbg_kernel # no session for this kernel connection (reports, does not error)
    arguments:
      connection_string: "net:port=50000,key=1.2.3.4"
    expect:
      isError: false
      contains: ["No active session found for kernel connection"]

  - call: definitely_not_a_tool   # unknown tool name
    arguments: {}
    expect:
      isError: true

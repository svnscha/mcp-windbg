name: Tool argument validation
description: session-id addressing and kind-checking are enforced for tool arguments.
steps:
  - call: run_cdb_command      # missing session_id -> schema validation error
    arguments:
      command: "k"
    expect:
      isError: true

  - call: run_cdb_command      # unknown session_id
    arguments:
      session_id: "cdb-deadbeef"
      command: "k"
    expect:
      isError: true
      contains:
        - "Unknown session_id"

  - call: run_kd_command       # unknown kernel session_id
    arguments:
      session_id: "kd-deadbeef"
      command: "vertarget"
    expect:
      isError: true
      contains:
        - "Unknown session_id"

  - call: send_ctrl_break      # missing session_id -> schema validation error
    arguments: {}
    expect:
      isError: true

  - call: send_ctrl_break      # unknown session_id
    arguments:
      session_id: "cdb-deadbeef"
    expect:
      isError: true
      contains:
        - "Unknown session_id"

  - call: open_kd_session      # empty kernel connection string is rejected before any kd launch
    arguments:
      connection_string: ""
    expect:
      isError: true

  - call: close_kd_session     # no session for this id (reports, does not error)
    arguments:
      session_id: "kd-00000000"
    expect:
      isError: false
      contains: ["No active kd session found"]

  - call: definitely_not_a_tool   # unknown tool name
    arguments: {}
    expect:
      isError: true

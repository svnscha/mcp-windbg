name: Invalid remote connection
description: Connecting to a dead endpoint surfaces a debugger error, not a hang.
requires:
  cdb: true        # spawns a real cdb -remote that fails to connect
server:
  args: ["--timeout", "8"]
steps:
  - call: open_cdb_remote
    arguments:
      connection_string: "tcp:Port=1,Server=127.0.0.1"
    expect:
      isError: true

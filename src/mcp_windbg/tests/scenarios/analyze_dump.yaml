name: Analyze a crash dump
description: Open the demo dump and confirm the standard triage report.
requires:
  cdb: true
  dump: DemoCrash1.exe.7088.dmp
server:
  args: ["--timeout", "120"]
steps:
  - call: open_windbg_dump
    arguments:
      dump_path: "{dump}"
      include_stack_trace: true
      include_modules: true
      include_threads: true
    expect:
      isError: false
      contains:
        - "Crash Information"
        - "Crash Analysis"
        - "Stack Trace"
        - "Loaded Modules"
        - "Threads"

  - call: close_windbg_dump
    arguments:
      dump_path: "{dump}"
    expect:
      contains:
        - "Successfully unloaded"

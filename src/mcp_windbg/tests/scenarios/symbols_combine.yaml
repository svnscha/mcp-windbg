name: Combine server and per-call symbol paths
description: A server --symbols-path and a per-call symbols_path are merged for a new session.
requires:
  cdb: true
  dump: DemoCrash1.exe.7088.dmp
server:
  args: ["--symbols-path", "C:/server-symbols", "--timeout", "120"]
steps:
  - call: open_cdb_dump
    arguments:
      dump_path: "{dump}"
      symbols_path: "C:/call-symbols"
      include_stack_trace: false
      include_modules: false
      include_threads: false
    capture:
      sid: 'session_id:\s*(cdb-[0-9a-f]+)'
    expect:
      isError: false
      contains:
        - "Crash Analysis"

  - call: close_cdb_session
    arguments:
      session_id: "{sid}"
    expect:
      contains:
        - "Successfully closed cdb session"

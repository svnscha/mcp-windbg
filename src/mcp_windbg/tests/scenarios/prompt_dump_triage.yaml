name: Dump triage prompt
description: The dump-triage prompt is served, and a dump path is woven in when given.
steps:
  - get_prompt: dump-triage
    expect:
      contains:
        - "Crash Dump Analysis Report"
        - open_cdb_dump

  - get_prompt: dump-triage
    arguments:
      dump_path: "C:/dumps/example.dmp"
    expect:
      contains:
        - "Dump file to analyze:"
        - "C:/dumps/example.dmp"

  - get_prompt: no-such-prompt
    expect:
      isError: true

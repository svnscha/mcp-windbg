name: Explicit cdb path
description: --cdb-path is honored when locating the debugger.
requires:
  cdb: true
  dump: DemoCrash1.exe.7088.dmp
server:
  args: ["--cdb-path", "{cdb}", "--timeout", "120"]
steps:
  - call: open_cdb_dump
    arguments:
      dump_path: "{dump}"
      include_stack_trace: false
      include_modules: false
      include_threads: false
    capture:
      sid: 'session_id:\s*(cdb-[0-9a-f]+)'
    expect:
      isError: false
      contains:
        - "Crash Analysis"

  - call: run_cdb_command
    arguments:
      session_id: "{sid}"
      command: "version"
    expect:
      isError: false
      contains:
        - "Microsoft (R) Windows Debugger"

  - call: close_cdb_session
    arguments:
      session_id: "{sid}"
    expect:
      contains:
        - "Successfully closed cdb session"

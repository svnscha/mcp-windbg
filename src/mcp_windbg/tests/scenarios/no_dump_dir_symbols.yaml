name: Disable automatic dump-directory symbols
description: --no-dump-dir-symbols opens a dump without adding its directory to the symbol path.
requires:
  cdb: true
  dump: DemoCrash1.exe.7088.dmp
server:
  args: ["--no-dump-dir-symbols", "--timeout", "120"]
steps:
  - call: open_windbg_dump
    arguments:
      dump_path: "{dump}"
      include_stack_trace: false
      include_modules: false
      include_threads: false
    expect:
      isError: false
      contains:
        - "Crash Analysis"

  - call: close_windbg_dump
    arguments:
      dump_path: "{dump}"
    expect:
      contains:
        - "Successfully unloaded"

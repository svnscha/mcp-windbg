name: Remote debugging workflow
description: Connect to a local cdb .server, run a command by session_id, and close it.
requires:
  remote: true     # harness starts a cdb remote server; {remote} is its connection string
steps:
  - call: open_cdb_remote
    arguments:
      connection_string: "{remote}"
      include_stack_trace: true
      include_modules: true
      include_threads: true
    capture:
      sid: 'session_id:\s*(cdb-[0-9a-f]+)'
    expect:
      isError: false
      contains:
        - "session_id: cdb-"
        - "Current Registers"
        - "Stack Trace"
        - "Loaded Modules"
        - "Threads"

  - call: run_cdb_command
    arguments:
      session_id: "{sid}"
      command: "r"
    expect:
      contains:
        - "Command: r"

  - call: close_cdb_session
    arguments:
      session_id: "{sid}"
    expect:
      contains:
        - "Successfully closed cdb session"

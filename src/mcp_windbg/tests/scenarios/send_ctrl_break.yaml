name: Break into a running target
description: send_ctrl_break interrupts a running remote target so commands work again.
requires:
  remote:
    target: ["waitfor.exe", "SomeSignalThatNeverComes"]   # blocks forever once resumed
steps:
  - call: open_cdb_remote
    arguments:
      connection_string: "{remote}"
    capture:
      sid: 'session_id:\s*(cdb-[0-9a-f]+)'
    expect:
      isError: false

  - server_input: "g"        # resume the target from the server side; it now runs
    wait: 1.0

  - call: send_ctrl_break
    arguments:
      session_id: "{sid}"
    expect:
      contains:
        - "Sent CTRL+BREAK"

  - call: run_cdb_command
    arguments:
      session_id: "{sid}"
      command: "r"
    expect:
      contains:
        - "Break instruction exception"

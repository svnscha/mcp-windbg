version: 2
updates:
  # Python dependencies (pyproject.toml and requirements-docs.txt)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "svnscha"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(python)"
    groups:
      # One PR for every pip update across all manifests in this directory
      # (pyproject.toml and requirements-docs.txt). Omitting update-types means
      # major bumps join the group too, instead of each opening its own PR.
      python:
        patterns:
          - "*"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "svnscha"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
    groups:
      # Group all GitHub Actions updates
      actions:
        patterns:
          - "*"

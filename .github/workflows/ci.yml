name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v5

    - name: Install WinDbg Preview
      run: winget install 9PGJGD53TN86 --accept-source-agreements --accept-package-agreements

    - name: Verify WinDbg Installation
      run: |
        Write-Host "Verifying CDB installation..."
        $localAppData = $env:LOCALAPPDATA
        $windowsAppsPath = "$localAppData\Microsoft\WindowsApps"
        
        $cdbExecutables = @("cdbX64.exe", "cdbX86.exe", "cdbARM64.exe", "cdb.exe")
        $foundCdb = $false
        
        foreach ($exe in $cdbExecutables) {
          $fullPath = Join-Path $windowsAppsPath $exe
          if (Test-Path $fullPath) {
            Write-Host "Found CDB executable: $fullPath"
            try {
              & $fullPath -version
              Write-Host "CDB version check successful"
              $foundCdb = $true
              break
            } catch {
              Write-Host "ERROR: Found CDB but execution failed: $fullPath"
            }
          }
        }
        
        if (-not $foundCdb) {
          Write-Host "ERROR: No working CDB executable found"
          Write-Host "Searched locations:"
          foreach ($exe in $cdbExecutables) {
            $fullPath = Join-Path $windowsAppsPath $exe
            Write-Host "  - $fullPath"
          }
          Write-Host "WindowsApps directory contents:"
          Get-ChildItem $windowsAppsPath -Name | Where-Object { $_ -like "*cdb*" } | ForEach-Object { Write-Host "  - $_" }
          exit 1
        }
        
        Write-Host "CDB verification completed successfully"

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --dev

    - name: Run tests
      run: uv run pytest src/mcp_server_windbg/tests/ -v --tb=short

    - name: Test CLI entry point
      run: |
        # Test that the CLI entry point works
        uv run python -m mcp_server_windbg --help || echo "CLI help command completed"

  build:
    runs-on: windows-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.10

    - name: Build package
      run: uv build

    - name: Check package
      run: uv run twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist-packages
        path: dist/
        retention-days: 7
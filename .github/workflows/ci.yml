name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v5
    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Windows SDK with Debugging Tools
      run: |
        Write-Host "Installing Windows SDK with Debugging Tools..."
        # Download Windows SDK installer
        $url = "https://go.microsoft.com/fwlink/?linkid=2196127"
        $installer = "winsdksetup.exe"
        
        Write-Host "Downloading Windows SDK installer..."
        Invoke-WebRequest -Uri $url -OutFile $installer
        
        Write-Host "Installing Windows SDK with debugging tools..."
        Start-Process -FilePath $installer -ArgumentList "/quiet", "/features", "OptionId.WindowsDesktopDebuggers" -Wait -NoNewWindow
        
        Write-Host "✅ Windows SDK installation completed"

    - name: Add Windows Debugging Tools to PATH
      run: |
        # Find and add Windows Debugging Tools to PATH
        $debuggerPaths = @(
          "${env:ProgramFiles(x86)}\Windows Kits\10\Debuggers\x64",
          "${env:ProgramFiles}\Windows Kits\10\Debuggers\x64",
          "${env:ProgramFiles(x86)}\Windows Kits\8.1\Debuggers\x64",
          "${env:ProgramFiles}\Windows Kits\8.1\Debuggers\x64"
        )
        
        foreach ($path in $debuggerPaths) {
          if (Test-Path "$path\cdb.exe") {
            Write-Host "Found Windows Debugging Tools at: $path"
            echo "$path" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            break
          }
        }
        
        # Verify CDB is available
        $cdb = Get-Command cdb.exe -ErrorAction SilentlyContinue
        if ($cdb) {
          Write-Host "✅ CDB available at: $($cdb.Source)"
          & cdb.exe -version
        } else {
          Write-Host "⚠️ CDB not found - tests will be skipped"
        }

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --dev

    - name: Run tests
      run: uv run pytest src/mcp_server_windbg/tests/ -v --tb=short

    - name: Test CLI entry point
      run: |
        # Test that the CLI entry point works
        uv run python -m mcp_server_windbg --help || echo "CLI help command completed"

  build:
    runs-on: windows-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.10

    - name: Build package
      run: uv build

    - name: Check package
      run: uv run twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist-packages
        path: dist/
        retention-days: 7
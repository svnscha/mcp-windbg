name: Build and Test

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test'
        required: false
        type: string
        default: '["3.10", "3.11", "3.12", "3.13", "3.14"]'
      check-version:
        description: 'Run the version-consistency check (release builds only)'
        required: false
        type: boolean
        default: false
    outputs:
      artifact-name:
        description: 'Name of the build artifact'
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  test:
    runs-on: windows-latest

    strategy:
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}

    steps:
    - uses: actions/checkout@v7
      with:
        lfs: true

    - name: Install WinDbg from Microsoft Store
      run: winget install 9PGJGD53TN86 --accept-source-agreements --accept-package-agreements

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --dev

    - name: Run tests with coverage
      env:
        MCP_WINDBG_COVERAGE: "1"   # measure the hosted server subprocess
      run: |
        uv run coverage erase
        uv run pytest src/mcp_windbg/tests/ -v --tb=short
        uv run coverage combine
        # Actual coverage is ~91%; the floor has margin for cross-version and
        # cdb-output jitter across the Windows x 5-Python-version matrix.
        uv run coverage report --fail-under=88

    - name: Test CLI entry point
      run: |
        # Test that the CLI entry point works
        uv run python -m mcp_windbg --help || echo "CLI help command completed"

    - name: Check version consistency
      if: ${{ inputs.check-version }}
      run: .\scripts\check-version-consistency.ps1

    - name: Validate server.json schema
      run: uv run python scripts/validate-server-schema.py

  build:
    runs-on: windows-latest
    needs: test
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.artifact-name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        lfs: true

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.10

    - name: Build package
      run: uv build

    - name: Check package
      run: uv run twine check dist/*

    - name: Set artifact name
      id: set-artifact-name
      run: |
        $artifactName = "dist-packages-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
        echo "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.set-artifact-name.outputs.artifact-name }}
        path: dist/
        retention-days: 7

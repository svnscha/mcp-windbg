name: Test Publish to TestPyPI

on:
  workflow_dispatch:  # Manual triggering only

jobs:
  test-publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write  # Required for potential future OIDC authentication
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest src/mcp_server_windbg/tests/ -v --tb=short

      - name: Build package
        run: uv build

      - name: Check package
        run: uv run twine check dist/*

      - name: Publish to TestPyPI
        run: uv publish --repository testpypi --token ${{ secrets.TEST_PYPI_API_TOKEN }}
